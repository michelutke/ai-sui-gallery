name: Build & Deploy Android

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/build_android.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: Android/src/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

  deploy:
    name: Deploy to Updraft
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: release-aab

      - name: Upload to Updraft
        run: |
          curl -X PUT \
            "https://app.getupdraft.com/api/app_upload/${{ secrets.UPDRAFT_APP_KEY }}/${{ secrets.UPDRAFT_API_KEY }}/" \
            -F app=@app-release.aab \
            -F "whats_new=$(git log -1 --pretty=%B)" \
            -F git_commit_hash=${{ github.sha }} \
            --http1.1 \
            --fail
