name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/build_android.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Decode keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('{0}/release.keystore', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Updraft
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X PUT \
            "https://app.getupdraft.com/api/app_upload/${{ secrets.UPDRAFT_APP_KEY }}/${{ secrets.UPDRAFT_API_KEY }}" \
            -F app=@app/build/outputs/apk/release/app-release.apk \
            -F "whats_new=$(git log -1 --pretty=%B)" \
            -F git_commit_hash=${{ github.sha }} \
            --http1.1 \
            --fail
